    <!-- Loading splash édito — typographic mark "ÉQUIPE BUTEAU" Cormorant italic
         + ligne bronze, navy bg. Masque le boot React ~2s sur chaque page load. -->
    <style>
      #app-loader{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#10223d;transition:opacity .5s ease-out;gap:24px}
      .app-loader-mark{font-family:"Cormorant Garamond","Georgia",serif;font-style:italic;font-weight:600;color:#f9f9f9;font-size:clamp(2.25rem,7vw,3.5rem);letter-spacing:.02em;line-height:1;animation:mark-breathe 2.4s ease-in-out infinite;text-shadow:0 8px 24px rgba(198,156,109,.15)}
      .app-loader-bar{position:relative;width:80px;height:1px;background:rgba(198,156,109,.18);overflow:hidden;border-radius:1px}
      .app-loader-bar::after{content:"";position:absolute;top:0;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,#c69c6d,transparent);animation:bar-slide 1.6s ease-in-out infinite}
      @keyframes mark-breathe{0%,100%{opacity:.78}50%{opacity:1}}
      @keyframes bar-slide{0%{left:-40%}100%{left:100%}}
      @media (prefers-reduced-motion: reduce){
        .app-loader-mark{animation:none;opacity:1}
        .app-loader-bar::after{animation:none;left:30%}
      }
    </style>
